<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNotes — Screenshot to Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4ff;
            --white: #ffffff;
            --blue: #4361ee;
            --blue-light: #eef0ff;
            --blue-dark: #2d46d6;
            --green: #059669;
            --orange: #ff6b35;
            --purple: #7b2d8b;
            --red: #ef233c;
            --text: #1a1a2e;
            --muted: #7c8db5;
            --border: #e2e8f5;
            --shadow: 0 4px 24px rgba(67,97,238,0.10);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 12px rgba(67,97,238,0.06);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--blue); }

        .tagline {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 0;
            flex: 1;
            height: calc(100vh - 61px);
        }

        /* LEFT PANEL */
        .left-panel {
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 36px 32px;
            gap: 24px;
        }

        .panel-heading h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .panel-heading p {
            font-size: 0.88rem;
            color: var(--muted);
            font-weight: 500;
            line-height: 1.6;
        }

        .upload-zone {
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .upload-zone:hover {
            border-color: var(--blue);
            background: var(--blue-light);
        }

        .upload-zone input { display: none; }
        .upload-zone label { cursor: pointer; display: block; }

        .upload-icon-wrap {
            width: 64px;
            height: 64px;
            background: var(--blue-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 16px;
            transition: all 0.25s;
        }

        .upload-zone:hover .upload-icon-wrap {
            background: var(--blue);
            transform: scale(1.08);
        }

        .upload-zone h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }

        .upload-zone p {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 500;
        }

        #preview-container { display: none; margin-top: 16px; }

        #preview {
            max-width: 100%;
            max-height: 160px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .analyze-btn {
            width: 100%;
            background: var(--blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.2px;
        }

        .analyze-btn:hover {
            background: var(--blue-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(67,97,238,0.35);
        }

        .analyze-btn:disabled {
            background: #c5cae9;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-wrap { display: none; }
        .loading-wrap.active { display: block; }

        .loading-text {
            font-size: 0.85rem;
            color: var(--blue);
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .loading-bar {
            height: 4px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, var(--blue), #06d6a0);
            animation: slide 1.2s ease-in-out infinite;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        /* RIGHT PANEL */
        .right-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .right-panel-header {
            padding: 24px 32px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            flex-shrink: 0;
        }

        .right-panel-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .right-panel-header p {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 500;
            margin-top: 2px;
        }

        .reports-count {
            background: var(--blue);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 999px;
            flex-shrink: 0;
        }

        .reports-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px 32px;
        }

        .reports-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--muted);
            gap: 12px;
            padding: 40px;
        }

        .reports-empty span { font-size: 3rem; }

        .reports-empty h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
        }

        .reports-empty p {
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.6;
            max-width: 260px;
        }

        /* REPORT CARD */
        .report-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s, transform 0.2s;
            animation: cardIn 0.3s ease;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .report-card:hover {
            box-shadow: 0 8px 28px rgba(67,97,238,0.13);
            transform: translateY(-1px);
        }

        .report-card-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            gap: 14px;
            cursor: pointer;
        }

        .report-card-info { flex: 1; min-width: 0; }

        .report-filename {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .report-date {
            font-size: 0.76rem;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .report-preview {
            font-size: 0.8rem;
            color: #9aa0b4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .report-actions {
            display: flex;
            gap: 7px;
            flex-shrink: 0;
        }

        .btn-view {
            background: var(--blue-light);
            color: var(--blue);
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-view:hover { background: #dce0ff; }

        .btn-delete {
            background: #fff0f2;
            color: var(--red);
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-delete:hover { background: #ffe0e4; }

        .expand-icon {
            font-size: 0.75rem;
            color: var(--muted);
            transition: transform 0.25s;
            flex-shrink: 0;
        }

        .expand-icon.open { transform: rotate(180deg); }

        /* EXPANDED DETAIL */
        .report-detail {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 16px 16px;
        }

        .report-detail.open { display: grid; }

        .detail-card {
            background: #f8faff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .detail-card h4 {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .detail-card ul { list-style: none; }

        .detail-card ul li {
            font-size: 0.84rem;
            color: #374151;
            font-weight: 500;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            line-height: 1.55;
        }

        .detail-card ul li:last-child { border-bottom: none; }

        .detail-notes h4 { color: var(--green); }
        .detail-tasks h4 { color: var(--blue); }
        .detail-reminders h4 { color: var(--orange); }
        .detail-points h4 { color: var(--purple); }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,26,46,0.5);
            backdrop-filter: blur(6px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 720px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 24px 80px rgba(67,97,238,0.2);
            animation: modalIn 0.22s cubic-bezier(0.16,1,0.3,1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal-close {
            background: #f3f4f6;
            border: none;
            color: #6b7280;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .modal-close:hover { background: #e5e7eb; color: var(--text); }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .modal-card {
            background: #f8faff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
        }

        .modal-card h4 {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .modal-card ul { list-style: none; }

        .modal-card ul li {
            font-size: 0.88rem;
            color: #374151;
            font-weight: 500;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            line-height: 1.65;
        }

        .modal-card ul li:last-child { border-bottom: none; }

        .modal-notes h4 { color: var(--green); }
        .modal-tasks h4 { color: var(--blue); }
        .modal-reminders h4 { color: var(--orange); }
        .modal-points h4 { color: var(--purple); }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; height: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
            .modal-grid { grid-template-columns: 1fr; }
            .report-detail { grid-template-columns: 1fr; }
        }
        .modal-questions h4 { color: #0891b2; }
        .modal-solutions h4 { color: #16a34a; }
        .detail-questions h4 { color: #0891b2; }
        .detail-solutions h4 { color: #16a34a; }
    </style>
</head>
<body>

<header>
    <div class="logo">Snap<span>Notes</span></div>
    <div class="tagline">AI-powered screenshot analysis</div>
</header>

<div class="main-layout">

    <!-- LEFT: UPLOAD -->
    <div class="left-panel">
        <div class="panel-heading">
            <h2>📸 Analyze Screenshot</h2>
            <p>Upload any screenshot to instantly extract notes, tasks, reminders and key points using AI.</p>
        </div>

        <div class="upload-zone">
            <input type="file" id="imageInput" accept="image/*">
            <label for="imageInput">
                <div class="upload-icon-wrap">📸</div>
                <h3>Click to upload</h3>
                <p>PNG, JPG, WEBP supported</p>
            </label>
            <div id="preview-container">
                <img id="preview" alt="Preview">
            </div>
        </div>

        <button class="analyze-btn" id="analyzeBtn" disabled>⚡ Analyze Screenshot</button>

        <div class="loading-wrap" id="loadingWrap">
            <div class="loading-text">🤖 Analyzing your screenshot...</div>
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- RIGHT: REPORTS -->
    <div class="right-panel">
        <div class="right-panel-header">
            <div>
                <h2>📋 Reports of Analysis</h2>
                <p>Click any report to expand · View opens full modal</p>
            </div>
            <span class="reports-count" id="reportsCount">0 reports</span>
        </div>
        <div class="reports-list" id="reportsList"></div>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Analysis Results</span>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-grid" id="modalGrid"></div>
    </div>
</div>

<script>
    const input = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const previewContainer = document.getElementById('preview-container');
    const btn = document.getElementById('analyzeBtn');
    const loadingWrap = document.getElementById('loadingWrap');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalGrid = document.getElementById('modalGrid');
    const modalTitle = document.getElementById('modalTitle');

    input.addEventListener('change', () => {
        const file = input.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            previewContainer.style.display = 'block';
            btn.disabled = false;
        }
    });

    btn.addEventListener('click', async () => {
        const file = input.files[0];
        if (!file) return;

        btn.disabled = true;
        loadingWrap.classList.add('active');

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('http://127.0.0.1:5000/analyze', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            await loadReports();
        } catch (err) {
            alert('Something went wrong. Make sure your backend is running!');
        } finally {
            btn.disabled = false;
            loadingWrap.classList.remove('active');
        }
    });

    function openModal(data, filename) {
        modalTitle.textContent = '📄 ' + (filename || 'Analysis Results');
        modalGrid.innerHTML = `
            <div class="modal-card modal-notes">
                <h4>📝 Notes</h4>
                <ul>${renderItems(data.notes)}</ul>
            </div>
            <div class="modal-card modal-tasks">
                <h4>✅ Tasks</h4>
                <ul>${renderItems(data.tasks)}</ul>
            </div>
            <div class="modal-card modal-reminders">
                <h4>🔔 Reminders</h4>
                <ul>${renderItems(data.reminders)}</ul>
            </div>
            <div class="modal-card modal-points">
                <h4>💡 Key Points</h4>
                <ul>${renderItems(data.points)}</ul>
            </div>
            <div class="modal-card modal-questions">
                <h4>❓ Questions</h4>
                <ul>${renderItems(data.questions)}</ul>
            </div>
            <div class="modal-card modal-solutions">
                <h4>🧮 Solutions</h4>
                <ul>${renderItems(data.solutions)}</ul>
            </div>
            
        `;
        modalOverlay.classList.add('open');
    }

    function renderItems(items) {
        if (!items || items.length === 0) return '<li style="color:#9aa0b4">Nothing found</li>';
        return items.map(i => `<li>${i}</li>`).join('');
    }

    modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    async function deleteItem(id, el) {
        if (!confirm('Delete this report?')) return;
        try {
            await fetch(`http://127.0.0.1:5000/delete/${id}`, { method: 'DELETE' });
            el.style.opacity = '0';
            el.style.transform = 'translateX(30px)';
            el.style.transition = 'all 0.3s ease';
            setTimeout(() => { el.remove(); updateCount(); }, 300);
        } catch (err) {
            alert('Failed to delete.');
        }
    }

    function updateCount() {
        const items = document.querySelectorAll('.report-card');
        const count = document.getElementById('reportsCount');
        count.textContent = `${items.length} ${items.length === 1 ? 'report' : 'reports'}`;
    }

    async function loadReports() {
        try {
            const res = await fetch('http://127.0.0.1:5000/history');
            const data = await res.json();
            const container = document.getElementById('reportsList');
            container.innerHTML = '';

            document.getElementById('reportsCount').textContent =
                `${data.length} ${data.length === 1 ? 'report' : 'reports'}`;

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="reports-empty">
                        <span>📋</span>
                        <h3>No reports yet</h3>
                        <p>Upload a screenshot on the left to generate your first analysis report.</p>
                    </div>`;
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'report-card';
                div.innerHTML = `
                    <div class="report-card-header" onclick="toggleDetail(${item.id})">
                        <div class="report-card-info">
                            <div class="report-filename">📄 ${item.filename}</div>
                            <div class="report-date">🕐 ${item.created_at}</div>
                            <div class="report-preview">${item.notes[0] || 'No notes extracted'}</div>
                        </div>
                        <div class="report-actions" onclick="event.stopPropagation()">
                            <button class="btn-view" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${item.filename}')">👁 View</button>
                            <button class="btn-delete" onclick="deleteItem(${item.id}, this.closest('.report-card'))">🗑 Delete</button>
                        </div>
                        <span class="expand-icon" id="icon-${item.id}">▼</span>
                    </div>
                    <div class="report-detail" id="detail-${item.id}">
                       <div class="detail-card detail-notes"><h4>📝 Notes</h4><ul>${renderItems(item.notes)}</ul></div>
                       <div class="detail-card detail-tasks"><h4>✅ Tasks</h4><ul>${renderItems(item.tasks)}</ul></div>
                       <div class="detail-card detail-reminders"><h4>🔔 Reminders</h4><ul>${renderItems(item.reminders)}</ul></div>
                       <div class="detail-card detail-points"><h4>💡 Key Points</h4><ul>${renderItems(item.points)}</ul></div>
                       <div class="detail-card detail-questions"><h4>❓ Questions</h4><ul>${renderItems(item.questions)}</ul></div>
                       <div class="detail-card detail-solutions"><h4>🧮 Solutions</h4><ul>${renderItems(item.solutions)}</ul></div>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (err) {
            console.error('Failed to load reports:', err);
        }
    }

    function toggleDetail(id) {
        const detail = document.getElementById(`detail-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        detail.classList.toggle('open');
        icon.classList.toggle('open');
    }

    loadReports();
</script>
</body>
</html>
